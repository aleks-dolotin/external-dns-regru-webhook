version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: sidecar
    main: ./cmd/sidecar
    binary: sidecar
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^_bmad"
      - "^Merge"

release:
  github:
    owner: aleks-dolotin
    name: external-dns-regru-webhook
  draft: false
  prerelease: auto
