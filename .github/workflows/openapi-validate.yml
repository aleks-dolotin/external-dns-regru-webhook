name: OpenAPI Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install openapi-cli
        run: npm install -g @redocly/openapi-cli
      - name: Validate OpenAPI
        run: openapi validate docs/openapi/adapter-v1.yaml
      - name: Fallback YAML parse check
        run: python3 -c "import yaml,sys; yaml.safe_load(open('docs/openapi/adapter-v1.yaml')); print('YAML ok')"

