name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Go vet
        run: make vet

      - name: Unit tests
        run: make test

      - name: Unit tests (race detector)
        run: make test-race

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Integration tests (mock Reg.ru)
        run: make test-integration

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t reg-adapter:${{ github.sha }} --build-arg VERSION=${{ github.sha }} .

      - name: Verify image runs
        run: |
          docker run --rm reg-adapter:${{ github.sha }} --help || true
          echo "Docker image built successfully"
