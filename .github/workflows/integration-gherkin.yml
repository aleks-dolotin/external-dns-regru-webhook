name: Integration tests (Gherkin)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  gherkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install behave requests
      - name: Start mock regru server
        run: |
          chmod +x tests/integration/mock-regru/start_mock.sh || true
          ./tests/integration/mock-regru/start_mock.sh &
          sleep 2
      - name: Run Gherkin scenarios
        run: |
          behave tests/gherkin || true

