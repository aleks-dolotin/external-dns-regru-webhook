{{- if .Values.prometheus.alerts.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "reg-adapter.fullname" . }}-alerts
  labels:
    {{- include "reg-adapter.labels" . | nindent 4 }}
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: reg-adapter.rules
      rules:
        - alert: RegAdapterNotReady
          expr: |
            kube_deployment_status_ready_replicas{deployment="{{ include "reg-adapter.fullname" . }}"} == 0
          for: {{ .Values.prometheus.alerts.readinessFailureMinutes | default "2" }}m
          labels:
            severity: critical
          annotations:
            summary: "Reg Adapter is not ready"
            description: "All reg-adapter replicas have been not-ready for more than {{ .Values.prometheus.alerts.readinessFailureMinutes | default "2" }} minutes."
            runbook_url: {{ .Values.prometheus.alerts.runbookBaseURL | default "https://github.com/aleks-dolotin/external-dns-regru-webhook/blob/main" }}/docs/runbooks/reg-adapter-runbook.md#incident-b--authentication-failure-invalid-credentials--signature-errors

        - alert: RegAdapterHighErrorRate
          expr: |
            (
              sum(rate(regru_api_requests_total{outcome="error"}[5m]))
              /
              sum(rate(regru_api_requests_total[5m]))
            ) > {{ .Values.prometheus.alerts.errorRateThreshold | default "0.05" }}
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Reg Adapter error rate exceeds {{ mul (int (.Values.prometheus.alerts.errorRateThreshold | default "0.05" | float64)) 100 | default "5" }}%"
            description: "Reg.ru API error rate is {{ "{{ $value | humanizePercentage }}" }} over the last 5 minutes."
            runbook_url: {{ .Values.prometheus.alerts.runbookBaseURL | default "https://github.com/aleks-dolotin/external-dns-regru-webhook/blob/main" }}/docs/runbooks/reg-adapter-runbook.md#incident-a--rate-limit-surge--many-429-responses

        - alert: RegAdapterQueueBacklog
          expr: |
            regru_queue_depth > {{ .Values.prometheus.alerts.queueDepthThreshold | default "1000" }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Reg Adapter queue backlog exceeds {{ .Values.prometheus.alerts.queueDepthThreshold | default "1000" }}"
            description: "Queue depth is {{ "{{ $value }}" }} for more than 5 minutes."
            runbook_url: {{ .Values.prometheus.alerts.runbookBaseURL | default "https://github.com/aleks-dolotin/external-dns-regru-webhook/blob/main" }}/docs/runbooks/reg-adapter-runbook.md#incident-e--queue-backlog-and-worker-lag

        - alert: RegAdapterAPIUnavailable
          expr: |
            sum(rate(regru_api_requests_total{outcome="success"}[5m])) == 0
            and
            sum(rate(regru_api_requests_total[5m])) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Reg.ru API is unavailable"
            description: "No successful API requests in the last 5 minutes while requests are being made."
            runbook_url: {{ .Values.prometheus.alerts.runbookBaseURL | default "https://github.com/aleks-dolotin/external-dns-regru-webhook/blob/main" }}/docs/runbooks/reg-adapter-runbook.md#incident-c--regru-outage--large-scale-5xx
{{- end }}

