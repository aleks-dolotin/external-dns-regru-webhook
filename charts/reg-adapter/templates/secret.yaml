{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reg-adapter.fullname" . }}-secret
  labels:
    {{- include "reg-adapter.labels" . | nindent 4 }}
type: Opaque
data:
  username: {{ .Values.secret.username | b64enc }}
  password: {{ .Values.secret.password | b64enc }}
{{- end }}

