apiVersion: apps/v1
kind: Deployment
metadata:
  name: reg-adapter
  namespace: reg-adapter
  labels:
    app.kubernetes.io/name: reg-adapter
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: reg-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reg-adapter
    spec:
      containers:
        - name: reg-adapter
          image: ghcr.io/example/reg-adapter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CONFIG_PATH
              value: "/etc/reg-adapter/config/mappings.yaml"
            - name: REGU_USERNAME
              valueFrom:
                secretKeyRef:
                  name: reg-credentials
                  key: username
            - name: REGU_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reg-credentials
                  key: password
          volumeMounts:
            - name: config
              mountPath: /etc/reg-adapter/config
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
      volumes:
        - name: config
          configMap:
            name: reg-adapter-config

