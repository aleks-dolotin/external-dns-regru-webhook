apiVersion: apps/v1
kind: Deployment
metadata:
  name: reg-adapter-worker
  namespace: reg-adapter
  labels:
    app.kubernetes.io/name: reg-adapter-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: reg-adapter-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reg-adapter-worker
    spec:
      containers:
        - name: reg-adapter-worker
          image: ghcr.io/example/reg-adapter-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CONFIG_PATH
              value: "/etc/reg-adapter/config/mappings.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/reg-adapter/config
              readOnly: true
          ports:
            - containerPort: 9090
              name: metrics
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: reg-adapter-config

