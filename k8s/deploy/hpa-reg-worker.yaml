apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reg-adapter-worker-hpa
  namespace: reg-adapter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reg-adapter-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

