---
# Story 5.5: Backpressure and rate-limiting alerts for reg-adapter.
# Deploy as PrometheusRule CRD or include via Helm chart alerting rules.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: reg-adapter-ratelimit-alerts
  labels:
    app: reg-adapter
spec:
  groups:
    - name: reg-adapter.ratelimit
      rules:
        # Alert when rate limiting is sustained (>10 rate-limited requests in 5 minutes).
        - alert: RegAdapterRateLimitActive
          expr: increase(regru_rate_limited_total[5m]) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Reg-adapter rate limiter active for zone {{ $labels.zone }}"
            description: "Zone {{ $labels.zone }} has been rate-limited {{ $value }} times in the last 5 minutes. Consider increasing REGADAPTER_RATE_PER_HOUR."

        # Alert when circuit breaker opens for any zone.
        - alert: RegAdapterCircuitOpen
          expr: regru_circuit_state == 2
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Circuit breaker OPEN for zone {{ $labels.zone }}"
            description: "Zone {{ $labels.zone }} circuit breaker has been open for >1m. Writes to this zone are suspended. Check Reg.ru API health."

        # Alert when circuit breaker is in half-open state for extended period.
        - alert: RegAdapterCircuitHalfOpen
          expr: regru_circuit_state == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Circuit breaker half-open for zone {{ $labels.zone }}"
            description: "Zone {{ $labels.zone }} has been in half-open state >10m. Probe requests may be failing."

        # Alert when retry rate is high.
        - alert: RegAdapterHighRetryRate
          expr: rate(regru_api_retries_total[5m]) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High API retry rate"
            description: "Reg.ru API retry rate is {{ $value }}/s. Possible transient errors or rate limiting upstream."

        # Alert when dead-letter queue grows.
        - alert: RegAdapterFailedOps
          expr: increase(regru_failed_ops_total[10m]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Failed operations detected ({{ $labels.action }})"
            description: "{{ $value }} operations exhausted all retries in the last 10 minutes."

