# Minimal PrometheusRule CRD definition for IDE schema validation.
# Source: prometheus-operator (https://github.com/prometheus-operator/prometheus-operator)
# This file is NOT applied to the cluster — it only helps the IDE
# recognise monitoring.coreos.com/v1 resources.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: prometheusrules.monitoring.coreos.com
spec:
  group: monitoring.coreos.com
  names:
    kind: PrometheusRule
    listKind: PrometheusRuleList
    plural: prometheusrules
    singular: prometheusrule
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                groups:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      interval:
                        type: string
                      rules:
                        type: array
                        items:
                          type: object
                          properties:
                            alert:
                              type: string
                            expr:
                              anyOf:
                                - type: string
                                - type: integer
                            for:
                              type: string
                            labels:
                              type: object
                              additionalProperties:
                                type: string
                            annotations:
                              type: object
                              additionalProperties:
                                type: string
                            record:
                              type: string
                    required:
                      - name
                      - rules

